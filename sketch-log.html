<style>
  :root {
    --mint:#7ec8a8;--mint-light:#e8f5ef;--mint-dark:#3d9e7a;
    --ink:#1a1f1c;--ink-mid:#4a5450;--ink-soft:#8a9890;
    --paper:#f5f2ed;--paper-2:#edeae3;--paper-3:#e3dfd6;--white:#fdfcfa;
    --lavender:#b8b0e0;--lavender-light:#eeeaf8;--lavender-dark:#7068b8;
    --amber:#d4a254;--amber-light:#f5ead8;--rose:#d08080;
    --safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom);
  }
  @media(prefers-color-scheme:dark){
    :root{--mint:#7ec8a8;--mint-light:#e8f5ef;--mint-dark:#3d9e7a;--ink:#1a1f1c;--ink-mid:#4a5450;--ink-soft:#8a9890;--paper:#f5f2ed;--paper-2:#edeae3;--paper-3:#e3dfd6;--white:#fdfcfa;--lavender:#b8b0e0;--lavender-light:#eeeaf8;--lavender-dark:#7068b8;--amber:#d4a254;--amber-light:#f5ead8;--rose:#d08080;}
    html,body{background:#f5f2ed!important;color:#1a1f1c!important;}
    input,textarea,button{color-scheme:light;}
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{background:var(--paper);}
  body{font-family:'Noto Sans JP','DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;min-height:-webkit-fill-available;font-weight:400;color-scheme:light;}

  /* PULL INDICATOR */
  .pull-indicator{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:flex-end;justify-content:center;height:0;overflow:hidden;background:var(--paper);pointer-events:none;}
  .pull-inner{display:flex;align-items:center;gap:8px;padding:10px 0 12px;opacity:0;transition:opacity .15s;}
  .pull-indicator.visible .pull-inner{opacity:1;}
  .pull-arc,.pull-spinner-wrap{width:22px;height:22px;flex-shrink:0;}
  .pull-arc svg,.pull-spinner-wrap svg{width:100%;height:100%;}
  .pull-spin-svg{animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .pull-label{font-family:'DM Mono',monospace;font-size:11px;font-weight:300;color:var(--ink-soft);letter-spacing:.08em;white-space:nowrap;}
  .pull-indicator.releasing .pull-label{color:var(--mint-dark);}
  .pull-indicator.refreshing .pull-label{color:var(--mint-dark);}

  /* HEADER */
  .header{position:sticky;top:0;z-index:100;background:var(--paper);border-bottom:1px solid var(--paper-3);padding:calc(var(--safe-top) + 14px) 20px 0;}
  .header-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;}
  .header-title{font-family:'DM Sans',sans-serif;font-size:19px;font-weight:600;letter-spacing:-.02em;}
  .header-title em{font-style:normal;color:var(--mint-dark);}
  .version-badge{font-family:'DM Mono',monospace;font-size:10px;font-weight:300;color:var(--ink-soft);background:var(--paper-2);border:1px solid var(--paper-3);border-radius:4px;padding:2px 7px;letter-spacing:.05em;}
  .tab-bar{display:flex;}
  .tab{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:8px 14px 10px;border:none;background:transparent;color:var(--ink-soft);cursor:pointer;position:relative;letter-spacing:.01em;transition:color .2s;}
  .tab::after{content:'';position:absolute;bottom:0;left:14px;right:14px;height:2px;background:transparent;border-radius:2px 2px 0 0;transition:background .2s;}
  .tab.active{color:var(--ink);}
  .tab.active::after{background:var(--mint-dark);}
  .tab.idea.active{color:var(--lavender-dark);}
  .tab.idea.active::after{background:var(--lavender-dark);}

  .view{display:none;padding-bottom:110px;}
  .view.active{display:block;}

  /* CALENDAR */
  .calendar-wrap{padding:20px 20px 16px;}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .cal-nav button{width:30px;height:30px;border:1px solid var(--paper-3);background:var(--white);border-radius:8px;font-size:14px;cursor:pointer;color:var(--ink-mid);display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;transition:background .15s;}
  .cal-nav button:active{background:var(--paper-2);}
  .cal-month{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;letter-spacing:-.01em;}
  .cal-month span{font-size:12px;font-weight:400;color:var(--ink-soft);margin-left:6px;font-family:'DM Mono',monospace;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-dow{font-family:'DM Mono',monospace;font-size:10px;text-align:center;color:var(--ink-soft);padding:4px 0;letter-spacing:.05em;}
  .cal-dow:first-child{color:var(--rose);}
  .cal-dow:last-child{color:var(--mint-dark);}
  .cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-family:'DM Mono',monospace;font-size:12px;font-weight:300;cursor:pointer;position:relative;transition:all .15s;color:var(--ink-mid);}
  .cal-day.empty{cursor:default;}
  .cal-day.today{background:var(--white);border:1px solid var(--paper-3);color:var(--ink);font-weight:400;}
  .cal-day.has-entry{background:var(--mint-light);color:var(--mint-dark);font-weight:400;}
  .cal-day.has-entry.today{background:var(--mint-dark);color:var(--white);border-color:var(--mint-dark);}
  .cal-day:not(.empty):not(.has-entry):hover{background:var(--paper-2);}

  /* 件数ドット */
  .cal-day .dots{position:absolute;bottom:3px;left:0;right:0;display:flex;justify-content:center;gap:2px;}
  .cal-day .dot{width:4px;height:4px;border-radius:50%;background:var(--mint-dark);}
  .cal-day.has-entry.today .dot{background:var(--white);}
  /* タップで登録できる日（エントリーなし）のホバー */
  .cal-day.tappable:active{background:var(--paper-3);}

  .stat-row{display:flex;gap:8px;margin:0 20px 20px;}
  .stat-card{flex:1;background:var(--white);border:1px solid var(--paper-3);border-radius:12px;padding:12px 14px;}
  .stat-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:4px;}
  .stat-value{font-family:'DM Sans',sans-serif;font-size:22px;font-weight:300;color:var(--ink);letter-spacing:-.02em;line-height:1;}
  .stat-value em{font-style:normal;font-size:12px;font-weight:400;color:var(--ink-soft);margin-left:2px;}
  .stat-sub{font-size:11px;color:var(--ink-soft);margin-top:2px;font-weight:300;}
  .section-label{padding:0 20px 10px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);}

  /* ENTRY CARDS */
  .entry-list{padding:0 20px;display:flex;flex-direction:column;gap:8px;}
  .entry-card{background:var(--white);border:1px solid var(--paper-3);border-radius:14px;overflow:hidden;display:flex;cursor:pointer;transition:border-color .15s,transform .12s;}
  .entry-card:active{transform:scale(.985);border-color:var(--mint);}
  .entry-thumb{width:78px;height:78px;flex-shrink:0;background:var(--mint-light);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--ink-soft);}
  .entry-thumb img{width:100%;height:100%;object-fit:cover;}
  .entry-body{padding:10px 14px;flex:1;min-width:0;}
  .entry-date{font-family:'DM Mono',monospace;font-size:10px;font-weight:300;color:var(--ink-soft);margin-bottom:3px;letter-spacing:.03em;}
  .entry-memo{font-size:13px;font-weight:400;line-height:1.5;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .entry-tags{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap;}
  .tag{font-family:'DM Mono',monospace;font-size:10px;font-weight:300;padding:2px 8px;border-radius:4px;letter-spacing:.03em;}
  .tag.練習{background:var(--mint-light);color:var(--mint-dark);}
  .tag.本番{background:var(--amber-light);color:var(--amber);}
  .tag.落書き{background:var(--lavender-light);color:var(--lavender-dark);}
  .tag.デジタル{background:#e0eaf8;color:#4870b8;}
  .tag.アナログ{background:#f5e8e0;color:#b87048;}
  .empty-state{text-align:center;padding:60px 32px;color:var(--ink-soft);}
  .empty-state .icon{font-size:36px;margin-bottom:12px;opacity:.5;}
  .empty-state p{font-size:13px;line-height:2;font-weight:300;}

  /* FAB */
  .fab-wrap{position:fixed;bottom:calc(var(--safe-bottom) + 24px);right:20px;z-index:200;}
  .fab{width:52px;height:52px;border-radius:14px;border:none;background:var(--ink);color:var(--white);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(26,31,28,.25);transition:transform .15s,background .2s;}
  .fab.idea-mode{background:var(--lavender-dark);}
  .fab:active{transform:scale(.9);}

  /* MODALS */
  .modal-backdrop{display:none;position:fixed;inset:0;z-index:300;background:rgba(26,31,28,.4);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);align-items:flex-end;}
  .modal-backdrop.open{display:flex;}
  .modal{width:100%;background:var(--paper);border-radius:22px 22px 0 0;padding:16px 20px calc(var(--safe-bottom) + 32px);max-height:92vh;overflow-y:auto;animation:slideUp .25s cubic-bezier(.32,.72,0,1);}
  @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .modal-handle{width:36px;height:4px;background:var(--paper-3);border-radius:2px;margin:0 auto 20px;cursor:pointer;}
  .modal-title{font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;letter-spacing:-.01em;margin-bottom:20px;}
  .form-group{margin-bottom:16px;}
  .form-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:7px;display:block;}
  .form-input{width:100%;border:1px solid var(--paper-3);border-radius:10px;padding:11px 13px;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:300;background:var(--white);color:var(--ink);outline:none;transition:border-color .2s;-webkit-appearance:none;}
  .form-input:focus{border-color:var(--mint-dark);}
  textarea.form-input{resize:none;height:78px;line-height:1.7;}
  .img-upload{width:100%;height:100px;border:1.5px dashed var(--paper-3);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-soft);font-size:12px;font-weight:300;gap:5px;transition:border-color .2s,background .2s;position:relative;overflow:hidden;background:var(--white);}
  .img-upload:hover{border-color:var(--mint-dark);background:var(--mint-light);}
  .img-upload .up-icon{font-size:24px;opacity:.5;}
  .img-upload input{position:absolute;inset:0;opacity:0;cursor:pointer;}
  .img-preview{width:100%;height:100px;border-radius:12px;object-fit:cover;display:none;}
  .tag-selector{display:flex;gap:6px;flex-wrap:wrap;}
  .tag-btn{font-family:'DM Mono',monospace;font-size:11px;font-weight:300;padding:6px 13px;border-radius:6px;border:1px solid var(--paper-3);background:var(--white);color:var(--ink-mid);cursor:pointer;transition:all .15s;letter-spacing:.02em;}
  .tag-btn[data-tag="練習"].selected{border-color:var(--mint-dark);background:var(--mint-light);color:var(--mint-dark);}
  .tag-btn[data-tag="本番"].selected{border-color:var(--amber);background:var(--amber-light);color:var(--amber);}
  .tag-btn[data-tag="落書き"].selected{border-color:var(--lavender-dark);background:var(--lavender-light);color:var(--lavender-dark);}
  .tag-btn[data-tag="デジタル"].selected{border-color:#4870b8;background:#e0eaf8;color:#4870b8;}
  .tag-btn[data-tag="アナログ"].selected{border-color:#b87048;background:#f5e8e0;color:#b87048;}
  .tag-btn[data-tag="人物"].selected,.tag-btn[data-tag="自然"].selected,.tag-btn[data-tag="静物"].selected,.tag-btn[data-tag="風景"].selected,.tag-btn[data-tag="ファンアート"].selected,.tag-btn[data-tag="その他"].selected{border-color:var(--lavender-dark);background:var(--lavender-light);color:var(--lavender-dark);}
  .btn-save{width:100%;padding:13px;background:var(--ink);color:var(--white);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;letter-spacing:.02em;cursor:pointer;margin-top:8px;transition:opacity .2s;}
  .btn-save.idea{background:var(--lavender-dark);}
  .btn-save:active{opacity:.75;}
  .detail-actions{display:flex;gap:8px;margin-top:16px;}
  .btn-edit{flex:1;padding:12px;background:transparent;color:var(--ink-mid);border:1px solid var(--paper-3);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s;}
  .btn-edit:active{background:var(--paper-2);}
  .btn-delete{flex:1;padding:12px;background:transparent;color:var(--rose);border:1px solid var(--rose);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;cursor:pointer;transition:all .15s;}
  .btn-delete.confirm-state{background:var(--rose);color:var(--white);}
  .detail-img{width:100%;border-radius:14px;max-height:240px;object-fit:cover;margin-bottom:16px;display:none;}
  .detail-meta{font-family:'DM Mono',monospace;font-size:10px;font-weight:300;color:var(--ink-soft);margin-bottom:8px;letter-spacing:.05em;}
  .detail-body{font-size:15px;font-weight:300;line-height:1.8;color:var(--ink);margin-bottom:12px;}

  /* IDEA TAB */
  .idea-header{display:flex;align-items:baseline;justify-content:space-between;padding:16px 20px 12px;}
  .idea-header-title{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--lavender-dark);}
  .idea-header-count{font-family:'DM Mono',monospace;font-size:10px;font-weight:300;color:var(--ink-soft);}
  .idea-list{padding:0 20px;display:flex;flex-direction:column;gap:7px;}
  .idea-card{background:var(--white);border:1px solid var(--lavender);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .15s;display:flex;gap:12px;align-items:flex-start;}
  .idea-card:active{transform:scale(.985);border-color:var(--lavender-dark);}
  .idea-card.done{opacity:.4;}
  .idea-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--lavender-dark);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;margin-top:2px;background:transparent;color:transparent;transition:all .2s;}
  .idea-card.done .idea-check{background:var(--lavender-dark);color:var(--white);}
  .idea-body{flex:1;min-width:0;}
  .idea-text{font-size:13px;font-weight:400;color:var(--ink);line-height:1.6;}
  .idea-card.done .idea-text{text-decoration:line-through;}
  .idea-note{font-size:11px;font-weight:300;color:var(--ink-soft);margin-top:3px;line-height:1.5;}
  .idea-meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap;}
  .idea-date{font-family:'DM Mono',monospace;font-size:10px;font-weight:300;color:var(--ink-soft);}
  .idea-cat{font-family:'DM Mono',monospace;font-size:10px;font-weight:300;padding:1px 7px;border-radius:4px;background:var(--lavender-light);color:var(--lavender-dark);}
  .btn-done{width:100%;padding:13px;background:var(--lavender-dark);color:var(--white);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:8px;transition:opacity .2s;}
  .btn-done:active{opacity:.75;}
  .btn-done.revert{background:transparent;color:var(--ink-soft);border:1px solid var(--paper-3);}
</style>
</head>
<body>

<div class="pull-indicator" id="pull-indicator">
  <div class="pull-inner">
    <div class="pull-arc" id="pull-arc">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="var(--paper-3)" stroke-width="2"/>
        <path id="pull-arc-path" d="M12 3 a9 9 0 0 1 9 9" stroke="var(--mint-dark)" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="pull-spinner-wrap" id="pull-spinner-wrap" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" class="pull-spin-svg">
        <circle cx="12" cy="12" r="9" stroke="var(--paper-3)" stroke-width="2"/>
        <path d="M12 3 a9 9 0 0 1 9 9" stroke="var(--mint-dark)" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="pull-label" id="pull-text">引っ張って更新</span>
  </div>
</div>

<header class="header">
  <div class="header-top">
    <div class="header-title">sketch<em>.</em>log</div>
    <div class="version-badge">v5</div>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('cal')">カレンダー</button>
    <button class="tab" onclick="switchTab('list')">一覧</button>
    <button class="tab idea" onclick="switchTab('idea')">アイデア帳</button>
  </div>
</header>

<div class="view active" id="view-cal">
  <div class="calendar-wrap">
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <div class="cal-month" id="cal-month-label"></div>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div class="stat-row">
    <div class="stat-card">
      <div class="stat-label">streak</div>
      <div class="stat-value" id="streak-val">0<em>日</em></div>
      <div class="stat-sub" id="streak-sub">今日も描こう</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">total</div>
      <div class="stat-value" id="total-val">0<em>枚</em></div>
      <div class="stat-sub" id="total-sub">&nbsp;</div>
    </div>
  </div>
  <div class="section-label">recent</div>
  <div class="entry-list" id="recent-list"></div>
</div>

<div class="view" id="view-list">
  <div class="section-label" id="list-label">0 entries</div>
  <div class="entry-list" id="all-list"></div>
</div>

<div class="view" id="view-idea">
  <div class="idea-header">
    <div class="idea-header-title">ideas</div>
    <div class="idea-header-count" id="idea-count">0 pending</div>
  </div>
  <div class="idea-list" id="idea-list"></div>
</div>

<div class="fab-wrap">
  <button class="fab" id="fab-btn" onclick="onFab()">＋</button>
</div>

<!-- 同日一覧モーダル -->
<div class="modal-backdrop" id="day-modal">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle" onclick="closeModal('day-modal')"></div>
    <div class="modal-title" id="day-modal-title"></div>
    <div id="day-list" style="display:flex;flex-direction:column;gap:8px;"></div>
    <button class="btn-save" style="margin-top:12px" id="day-add-btn" onclick="addFromDay()">この日に追加 ＋</button>
  </div>
</div>

<!-- 記録追加/編集 -->
<div class="modal-backdrop" id="add-modal">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle" onclick="closeModal('add-modal')"></div>
    <div class="modal-title" id="add-modal-title">New entry</div>
    <div class="form-group">
      <label class="form-label">image</label>
      <img id="img-preview" class="img-preview" alt="">
      <div class="img-upload" id="img-upload-area">
        <span class="up-icon">🖼</span>
        <span>タップして選択</span>
        <input type="file" accept="image/*" onchange="handleImage(event)">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">memo</label>
      <textarea class="form-input" id="input-memo" placeholder="今日の一言"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">tags</label>
      <div class="tag-selector">
        <button class="tag-btn" data-tag="練習" onclick="toggleTag(this)">練習</button>
        <button class="tag-btn" data-tag="本番" onclick="toggleTag(this)">本番</button>
        <button class="tag-btn" data-tag="落書き" onclick="toggleTag(this)">落書き</button>
        <button class="tag-btn" data-tag="デジタル" onclick="toggleTag(this)">デジタル</button>
        <button class="tag-btn" data-tag="アナログ" onclick="toggleTag(this)">アナログ</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">date</label>
      <input type="date" class="form-input" id="input-date">
    </div>
    <button class="btn-save" id="entry-save-btn" onclick="saveEntry()">保存する</button>
  </div>
</div>

<!-- アイデア追加/編集 -->
<div class="modal-backdrop" id="idea-modal">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle" onclick="closeModal('idea-modal')"></div>
    <div class="modal-title" id="idea-modal-title">New idea</div>
    <div class="form-group">
      <label class="form-label">motif</label>
      <input type="text" class="form-input" id="idea-input-text" placeholder="例：雨の日の窓、猫の手、柊">
    </div>
    <div class="form-group">
      <label class="form-label">memo（任意）</label>
      <textarea class="form-input" id="idea-input-note" placeholder="イメージやこだわりなど"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">category（任意）</label>
      <div class="tag-selector" id="idea-cat-selector">
        <button class="tag-btn" data-tag="人物" onclick="toggleCat(this)">人物</button>
        <button class="tag-btn" data-tag="自然" onclick="toggleCat(this)">自然</button>
        <button class="tag-btn" data-tag="静物" onclick="toggleCat(this)">静物</button>
        <button class="tag-btn" data-tag="風景" onclick="toggleCat(this)">風景</button>
        <button class="tag-btn" data-tag="ファンアート" onclick="toggleCat(this)">ファンアート</button>
        <button class="tag-btn" data-tag="その他" onclick="toggleCat(this)">その他</button>
      </div>
    </div>
    <button class="btn-save idea" id="idea-save-btn" onclick="saveIdea()">追加する</button>
  </div>
</div>

<!-- 記録詳細 -->
<div class="modal-backdrop" id="detail-modal">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle" onclick="closeModal('detail-modal')"></div>
    <img id="detail-img" class="detail-img" alt="">
    <div class="detail-meta" id="detail-meta"></div>
    <div class="detail-body" id="detail-memo"></div>
    <div class="entry-tags" id="detail-tags"></div>
    <div class="detail-actions">
      <button class="btn-edit" onclick="openEditEntry()">編集</button>
      <button class="btn-delete" id="del-entry-btn" onclick="confirmDelete('entry')">削除</button>
    </div>
  </div>
</div>

<!-- アイデア詳細 -->
<div class="modal-backdrop" id="idea-detail-modal">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle" onclick="closeModal('idea-detail-modal')"></div>
    <div class="detail-meta" id="idea-detail-date"></div>
    <div class="detail-body" id="idea-detail-text"></div>
    <div style="font-size:13px;font-weight:300;color:var(--ink-soft);line-height:1.7;margin-bottom:10px" id="idea-detail-note"></div>
    <div class="idea-meta" id="idea-detail-cats"></div>
    <button class="btn-done" id="done-btn" onclick="toggleIdeaDone()">描いた ✓</button>
    <div class="detail-actions">
      <button class="btn-edit" onclick="openEditIdea()">編集</button>
      <button class="btn-delete" id="del-idea-btn" onclick="confirmDelete('idea')">削除</button>
    </div>
  </div>
</div>

<script>
const SK='sketch_log_v1',IK='sketch_ideas_v1';
let entries=[],ideas=[],currentTab='cal',currentMonth=new Date();
let currentDetailId=null,currentIdeaId=null;
let pendingImageData=null,editingEntryId=null,editingIdeaId=null;
let deleteConfirmTimer=null;

function load(){
  try{entries=JSON.parse(localStorage.getItem(SK))||[];}catch{entries=[];}
  try{ideas=JSON.parse(localStorage.getItem(IK))||[];}catch{ideas=[];}
}
function saveEntries(){localStorage.setItem(SK,JSON.stringify(entries));}
function saveIdeas(){localStorage.setItem(IK,JSON.stringify(ideas));}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['cal','list','idea'][i]===tab));
  ['cal','list','idea'].forEach(t=>document.getElementById('view-'+t).classList.toggle('active',t===tab));
  document.getElementById('fab-btn').classList.toggle('idea-mode',tab==='idea');
  if(tab==='list') renderList();
  if(tab==='idea') renderIdeas();
}

function onFab(){
  if(currentTab==='idea') openIdeaAdd(); else openAdd();
}

function changeMonth(d){
  currentMonth=new Date(currentMonth.getFullYear(),currentMonth.getMonth()+d,1);
  renderCalendar();
}

function renderCalendar(){
  const y=currentMonth.getFullYear(),m=currentMonth.getMonth();
  const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('cal-month-label').innerHTML=`${y}<span>${mn[m]}</span>`;

  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d=>{
    const el=document.createElement('div');el.className='cal-dow';el.textContent=d;grid.appendChild(el);
  });
  const first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),today=toDateStr(new Date());
  for(let i=0;i<first;i++){const el=document.createElement('div');el.className='cal-day empty';grid.appendChild(el);}
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayEntries=entries.filter(x=>x.date===ds);
    const el=document.createElement('div');
    el.className='cal-day';
    if(ds===today) el.classList.add('today');
    if(dayEntries.length>0){
      el.classList.add('has-entry');
      // 件数ドット（最大3）
      const dotsEl=document.createElement('div');
      dotsEl.className='dots';
      const dotCount=Math.min(dayEntries.length,3);
      for(let i=0;i<dotCount;i++){
        const dot=document.createElement('div');dot.className='dot';dotsEl.appendChild(dot);
      }
      el.addEventListener('click',()=>openDayModal(ds,dayEntries));
      el.appendChild(dotsEl);
    } else {
      el.addEventListener('click',()=>openAdd(ds));
    }
    el.appendChild(document.createTextNode(d));
    grid.appendChild(el);
  }
  renderStats();
  renderRecent();
}

function renderStats(){
  const total=entries.length;
  document.getElementById('total-val').innerHTML=`${total}<em>枚</em>`;
  let streak=0;
  const ds=new Set(entries.map(e=>e.date));
  let c=new Date(); c.setHours(0,0,0,0);
  while(ds.has(toDateStr(c))){streak++;c.setDate(c.getDate()-1);}
  document.getElementById('streak-val').innerHTML=`${streak}<em>日</em>`;
  document.getElementById('streak-sub').textContent=streak===0?'今日も描こう':`${streak}日連続中`;
  document.getElementById('total-sub').textContent=total===0?'まだ記録なし':`記録: ${total}件`;
}

function renderRecent(){
  const r=[...entries].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  document.getElementById('recent-list').innerHTML=r.length
    ?r.map(entryCardHTML).join('')
    :`<div class="empty-state"><div class="icon">✏️</div><p>まだ記録がありません<br>右下の ＋ から追加</p></div>`;
}

function renderList(){
  const s=[...entries].sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('list-label').textContent=`${s.length} entries`;
  document.getElementById('all-list').innerHTML=s.length
    ?s.map(entryCardHTML).join('')
    :`<div class="empty-state"><div class="icon">✏️</div><p>まだ記録がありません</p></div>`;
}

function entryCardHTML(e){
  const thumb=e.image?`<div class="entry-thumb"><img src="${e.image}" alt=""></div>`:`<div class="entry-thumb">🖼</div>`;
  const tags=(e.tags||[]).map(t=>`<span class="tag ${t}">${t}</span>`).join('');
  return `<div class="entry-card" onclick="openDetail('${e.id}')">
    ${thumb}
    <div class="entry-body">
      <div class="entry-date">${e.date}</div>
      <div class="entry-memo">${escHTML(e.memo||'—')}</div>
      <div class="entry-tags">${tags}</div>
    </div>
  </div>`;
}

function renderIdeas(){
  const pending=ideas.filter(i=>!i.done);
  document.getElementById('idea-count').textContent=`${pending.length} pending`;
  const all=[...pending,...ideas.filter(i=>i.done)];
  document.getElementById('idea-list').innerHTML=all.length?all.map(idea=>{
    const cats=(idea.cats||[]).map(c=>`<span class="idea-cat">${c}</span>`).join('');
    const note=idea.note?`<div class="idea-note">${escHTML(idea.note)}</div>`:'';
    return `<div class="idea-card ${idea.done?'done':''}" onclick="openIdeaDetail('${idea.id}')">
      <div class="idea-check">${idea.done?'✓':''}</div>
      <div class="idea-body">
        <div class="idea-text">${escHTML(idea.text)}</div>
        ${note}
        <div class="idea-meta">${cats}<span class="idea-date">${idea.date}</span></div>
      </div>
    </div>`;
  }).join(''):`<div class="empty-state"><div class="icon">💡</div><p>描きたいものを<br>貯めておこう</p></div>`;
}

// 同日一覧モーダル
let currentDayStr=null;
function openDayModal(ds, dayEntries){
  currentDayStr=ds;
  document.getElementById('day-modal-title').textContent=ds + ' — ' + dayEntries.length + '件';
  document.getElementById('day-list').innerHTML=dayEntries.map(e=>{
    const thumb=e.image?`<img src="${e.image}" style="width:52px;height:52px;object-fit:cover;border-radius:8px;flex-shrink:0">`:`<div style="width:52px;height:52px;border-radius:8px;background:var(--mint-light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🖼</div>`;
    const tags=(e.tags||[]).map(t=>`<span class="tag ${t}">${t}</span>`).join('');
    return `<div class="entry-card" onclick="closeModal('day-modal');openDetail('${e.id}')">
      ${thumb}
      <div class="entry-body">
        <div class="entry-memo">${escHTML(e.memo||'—')}</div>
        <div class="entry-tags">${tags}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('day-modal').classList.add('open');
}

function addFromDay(){
  const ds=currentDayStr;
  closeModal('day-modal');
  openAdd(ds);
}

// 追加フォームを開く（dateStr省略時は今日）
function openAdd(dateStr){
  editingEntryId=null;
  pendingImageData=null;
  document.getElementById('add-modal-title').textContent='New entry';
  document.getElementById('entry-save-btn').textContent='保存する';
  document.getElementById('input-memo').value='';
  document.getElementById('input-date').value=dateStr||toDateStr(new Date());
  document.querySelectorAll('#add-modal .tag-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('img-preview').style.display='none';
  document.getElementById('img-upload-area').style.display='flex';
  document.getElementById('add-modal').classList.add('open');
}

function openEditEntry(){
  const e=entries.find(x=>x.id===currentDetailId); if(!e) return;
  editingEntryId=e.id;
  pendingImageData=e.image||null;
  document.getElementById('add-modal-title').textContent='Edit entry';
  document.getElementById('entry-save-btn').textContent='更新する';
  document.getElementById('input-memo').value=e.memo||'';
  document.getElementById('input-date').value=e.date;
  document.querySelectorAll('#add-modal .tag-btn').forEach(b=>{
    b.classList.toggle('selected',(e.tags||[]).includes(b.dataset.tag));
  });
  const p=document.getElementById('img-preview'),ua=document.getElementById('img-upload-area');
  if(e.image){p.src=e.image;p.style.display='block';ua.style.display='none';}
  else{p.style.display='none';ua.style.display='flex';}
  closeModal('detail-modal');
  document.getElementById('add-modal').classList.add('open');
}

function handleImage(ev){
  const file=ev.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    pendingImageData=e.target.result;
    const p=document.getElementById('img-preview');
    p.src=pendingImageData; p.style.display='block';
    document.getElementById('img-upload-area').style.display='none';
  };
  r.readAsDataURL(file);
}

function toggleTag(btn){btn.classList.toggle('selected');}
function toggleCat(btn){btn.classList.toggle('selected');}

function saveEntry(){
  const dateEl=document.getElementById('input-date');
  const date=dateEl.value||toDateStr(new Date());
  const data={
    date,
    memo:document.getElementById('input-memo').value.trim(),
    tags:[...document.querySelectorAll('#add-modal .tag-btn.selected')].map(b=>b.dataset.tag),
    image:pendingImageData||null
  };
  if(editingEntryId){
    const idx=entries.findIndex(e=>e.id===editingEntryId);
    if(idx!==-1) entries[idx]={...entries[idx],...data};
  } else {
    entries.push({id:Date.now().toString(),...data,createdAt:new Date().toISOString()});
  }
  saveEntries();
  closeModal('add-modal');
  renderCalendar();
  renderList();
}

function openDetail(id){
  const e=entries.find(x=>x.id===id); if(!e) return;
  currentDetailId=id;
  const img=document.getElementById('detail-img');
  if(e.image){img.src=e.image;img.style.display='block';}else{img.style.display='none';}
  document.getElementById('detail-meta').textContent=e.date;
  document.getElementById('detail-memo').textContent=e.memo||'—';
  document.getElementById('detail-tags').innerHTML=(e.tags||[]).map(t=>`<span class="tag ${t}">${t}</span>`).join('');
  const db=document.getElementById('del-entry-btn');
  if(db){db.classList.remove('confirm-state');db.textContent='削除';}
  document.getElementById('detail-modal').classList.add('open');
}

function deleteEntry(){
  entries=entries.filter(e=>e.id!==currentDetailId);
  saveEntries();
  closeModal('detail-modal');
  renderCalendar();
  renderList();
}

function openIdeaAdd(){
  editingIdeaId=null;
  document.getElementById('idea-modal-title').textContent='New idea';
  document.getElementById('idea-save-btn').textContent='追加する';
  document.getElementById('idea-input-text').value='';
  document.getElementById('idea-input-note').value='';
  document.querySelectorAll('#idea-cat-selector .tag-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('idea-modal').classList.add('open');
}

function openEditIdea(){
  const idea=ideas.find(i=>i.id===currentIdeaId); if(!idea) return;
  editingIdeaId=idea.id;
  document.getElementById('idea-modal-title').textContent='Edit idea';
  document.getElementById('idea-save-btn').textContent='更新する';
  document.getElementById('idea-input-text').value=idea.text||'';
  document.getElementById('idea-input-note').value=idea.note||'';
  document.querySelectorAll('#idea-cat-selector .tag-btn').forEach(b=>{
    b.classList.toggle('selected',(idea.cats||[]).includes(b.dataset.tag));
  });
  closeModal('idea-detail-modal');
  document.getElementById('idea-modal').classList.add('open');
}

function saveIdea(){
  const text=document.getElementById('idea-input-text').value.trim();
  if(!text) return; // 空なら何もしない（alertなし）
  const data={
    text,
    note:document.getElementById('idea-input-note').value.trim(),
    cats:[...document.querySelectorAll('#idea-cat-selector .tag-btn.selected')].map(b=>b.dataset.tag)
  };
  if(editingIdeaId){
    const idx=ideas.findIndex(i=>i.id===editingIdeaId);
    if(idx!==-1) ideas[idx]={...ideas[idx],...data};
  } else {
    ideas.unshift({id:Date.now().toString(),...data,done:false,date:toDateStr(new Date())});
  }
  saveIdeas();
  closeModal('idea-modal');
  renderIdeas();
}

function openIdeaDetail(id){
  const idea=ideas.find(i=>i.id===id); if(!idea) return;
  currentIdeaId=id;
  document.getElementById('idea-detail-date').textContent=idea.date;
  document.getElementById('idea-detail-text').textContent=idea.text;
  document.getElementById('idea-detail-note').textContent=idea.note||'';
  document.getElementById('idea-detail-cats').innerHTML=(idea.cats||[]).map(c=>`<span class="idea-cat">${c}</span>`).join('');
  const btn=document.getElementById('done-btn');
  btn.textContent=idea.done?'未完了に戻す':'描いた ✓';
  btn.className=idea.done?'btn-done revert':'btn-done';
  const db=document.getElementById('del-idea-btn');
  if(db){db.classList.remove('confirm-state');db.textContent='削除';}
  document.getElementById('idea-detail-modal').classList.add('open');
}

function toggleIdeaDone(){
  const idea=ideas.find(i=>i.id===currentIdeaId); if(!idea) return;
  idea.done=!idea.done; saveIdeas();
  closeModal('idea-detail-modal');
  renderIdeas();
}

function deleteIdea(){
  ideas=ideas.filter(i=>i.id!==currentIdeaId);
  saveIdeas();
  closeModal('idea-detail-modal');
  renderIdeas();
}

function closeModal(id){document.getElementById(id).classList.remove('open');}

function confirmDelete(type){
  const btnId=type==='entry'?'del-entry-btn':'del-idea-btn';
  const btn=document.getElementById(btnId); if(!btn) return;
  if(btn.classList.contains('confirm-state')){
    clearTimeout(deleteConfirmTimer);
    if(type==='entry') deleteEntry(); else deleteIdea();
  } else {
    btn.classList.add('confirm-state');
    btn.textContent='本当に削除';
    deleteConfirmTimer=setTimeout(()=>{
      btn.classList.remove('confirm-state');
      btn.textContent='削除';
    },3000);
  }
}

function toDateStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function escHTML(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

load(); renderCalendar();

// プルリフレッシュ
(function(){
  let startY=0,pulling=false,threshold=80;
  const ind=document.getElementById('pull-indicator');
  const txt=document.getElementById('pull-text');
  const arc=document.getElementById('pull-arc');
  const arcPath=document.getElementById('pull-arc-path');
  const spinnerWrap=document.getElementById('pull-spinner-wrap');

  function setArc(pct){
    // 0〜1のpctで円弧を描く（SVG path）
    const angle=pct*360;
    const rad=(angle-90)*Math.PI/180;
    const x=12+9*Math.cos(rad), y=12+9*Math.sin(rad);
    const large=angle>180?1:0;
    arcPath.setAttribute('d',`M12 3 a9 9 0 ${large} 1 ${x-12} ${y-3}`);
  }

  document.addEventListener('touchstart',e=>{
    if(window.scrollY<=0){startY=e.touches[0].clientY;pulling=true;}
  },{passive:true});

  document.addEventListener('touchmove',e=>{
    if(!pulling) return;
    if(window.scrollY>0){pulling=false;ind.style.height='0';ind.classList.remove('visible','releasing');return;}
    const dy=e.touches[0].clientY-startY;
    if(dy<=0) return;
    const pct=Math.min(dy/threshold,1);
    const h=pct*60;
    ind.style.height=h+'px';
    ind.classList.toggle('visible',dy>10);
    setArc(pct);
    if(dy>=threshold){
      ind.classList.add('releasing');
      txt.textContent='離して更新';
      setArc(1);
    } else {
      ind.classList.remove('releasing');
      txt.textContent='引っ張って更新';
    }
  },{passive:true});

  document.addEventListener('touchend',e=>{
    if(!pulling) return; pulling=false;
    const dy=e.changedTouches[0].clientY-startY;
    if(dy>=threshold){
      // スピナーに切替
      arc.style.display='none';
      spinnerWrap.style.display='block';
      ind.classList.add('refreshing','visible');
      ind.style.height='60px';
      txt.textContent='更新中…';
      setTimeout(()=>{
        load(); renderCalendar();
        if(document.getElementById('view-list').classList.contains('active')) renderList();
        if(document.getElementById('view-idea').classList.contains('active')) renderIdeas();
        ind.classList.remove('refreshing','releasing','visible');
        ind.style.height='0';
        txt.textContent='引っ張って更新';
        arc.style.display='block';
        spinnerWrap.style.display='none';
        setArc(0);
      },800);
    } else {
      ind.classList.remove('visible','releasing');
      ind.style.height='0';
      setArc(0);
    }
  },{passive:true});
})();
</script>
